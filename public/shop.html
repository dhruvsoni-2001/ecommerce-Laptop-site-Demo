<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop | EADC Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/site.css" />
  <link rel="icon" href="images/fevicon.png" type="image/gif" />
</head>
<body>
  <header class="site-header navbar navbar-expand-lg glass-nav sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.png" class="me-2" alt="EADC" />
        EADC Store
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart <span class="badge bg-info cart-count">0</span></a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item ms-lg-2">
            <button id="themeToggleBtn" class="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode"><i class="fa-solid fa-moon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </header>
  <main>
    <section class="page-header py-5 text-white">
      <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-4">
          <div>
            <span class="section-tag" style="background:rgba(201,149,46,0.15);color:var(--gold-light)">Our collection</span>
            <h1 class="display-6 mb-2">Browse our catalog</h1>
            <p class="mb-0 text-white-75">Find the right equipment and accessories for your workspace.</p>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <input id="searchInput" class="form-control form-control-lg glass-input" type="search" placeholder="Search products" aria-label="Search products" style="background:rgba(255,255,255,0.1)!important;color:#fff!important;border-color:rgba(255,255,255,0.15)!important;min-width:240px" />
            <a href="cart.html" class="btn btn-primary btn-lg px-4" style="background:var(--gradient-accent);color:var(--navy)">
              <i class="fa-solid fa-cart-shopping"></i> <span class="cart-count">0</span>
            </a>
          </div>
        </div>
      </div>
    </section>
    <section class="py-5">
      <div class="container">
        <div id="productGrid" class="row gy-4"></div>
      </div>
    </section>
  </main>
  <footer class="footer py-4 text-white glass">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
      <span>© 2026 EADC Store. All rights reserved.</span>
      <div class="d-flex gap-3">
        <a href="#" class="text-white text-decoration-none"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" class="text-white text-decoration-none"><i class="fa-brands fa-twitter"></i></a>
        <a href="#" class="text-white text-decoration-none"><i class="fa-brands fa-instagram"></i></a>
      </div>
    </div>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
